<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Placas de Vídeo</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f8f9fa; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-primary { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-primary:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .btn-danger:hover { background: #c82333; }
        .btn-logout { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #e9ecef; }
        a.edit-link { color: #007bff; text-decoration: none; font-weight: bold; margin-right: 10px; }
        a.edit-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Controle de Estoque</h1>
        <span sec:authorize="isAuthenticated()">
            Logado como <strong sec:authentication="name"></strong>
            <form th:action="@{/logout}" method="post" style="display:inline; margin-left: 10px;">
                <button type="submit" class="btn-logout">Sair</button>
            </form>
        </span>
    </div>

    <div class="box">
        <h2 th:text="${placa != null and placa.id != null ? 'Editar Placa' : 'Cadastrar Nova Placa (INSERT)'}"></h2>
        <form th:action="@{/placas/salvar}" th:object="${placa}" method="post">
            <input type="hidden" th:field="*{id}" th:if="${placa != null and placa.id != null}"/>
            <input type="text" th:field="*{modelo}" placeholder="Modelo (ex: RTX 4060)" required/>
            <input type="text" th:field="*{marca}" placeholder="Marca (ex: ASUS)"/>
            <input type="number" step="0.01" th:field="*{preco}" placeholder="Preço"/>
            <button type="submit" class="btn-primary">Gravar no Banco</button>
        </form>

        <hr style="margin: 30px 0; border: 1px solid #eee;">

        <h2>Placas no Sistema (SELECT)</h2>
        <table>
            <thead>
                <tr>
                    <th>Modelo</th>
                    <th>Marca</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${lista}">
                    <td th:text="${p.modelo}"></td>
                    <td th:text="${p.marca}"></td>
                    <td th:text="'R$ ' + ${#numbers.formatDecimal(p.preco, 1, 2, 'COMMA')}"></td>
                    <td>
                        <a th:href="@{'/placas/editar/' + ${p.id}}" class="edit-link">Editar</a>
                        <form th:action="@{'/placas/deletar/' + ${p.id}}" method="post" style="display:inline;">
                            <button type="submit" class="btn-danger">Deletar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(lista)}">Nenhuma placa cadastrada.</p>
    </div>
</body>
</html>
