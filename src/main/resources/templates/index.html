<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Placas de Vídeo</title>
    <style> body { font-family: sans-serif; margin: 40px; background-color: #f8f9fa; } .box { background: white; padding: 20px; border-radius: 10px; } table { width: 100%; border-collapse: collapse; margin-top: 20px; } th, td { border: 1px solid #ddd; padding: 12px; } </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>SIGA - Placas</h1>
        <span sec:authorize="isAuthenticated()">
            Logado como <strong sec:authentication="name"></strong>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit">Sair</button>
            </form>
        </span>
    </div>

    <div class="box">
        <h2 th:text="${placa.id == null ? 'Cadastrar Nova Placa' : 'Editar Placa'}"></h2>
        <form th:action="@{/placas/salvar}" th:object="${placa}" method="post">
            <input type="hidden" th:field="*{id}"/>
            <input type="text" th:field="*{modelo}" placeholder="Modelo" required/>
            <input type="text" th:field="*{marca}" placeholder="Marca"/>
            <input type="number" step="0.01" th:field="*{preco}" placeholder="Preço"/>
            <button type="submit">Gravar no Banco</button>
        </form>

        <hr style="margin: 30px 0;">

        <h2>Placas no Sistema</h2>
        <table>
            <thead>
                <tr>
                    <th>Modelo</th>
                    <th>Marca</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${lista}">
                    <td th:text="${p.modelo}"></td>
                    <td th:text="${p.marca}"></td>
                    <td th:text="'R$ ' + ${#numbers.formatDecimal(p.preco, 1, 2, 'COMMA')}"></td>
                    <td>
                        <a th:href="@{'/placas/editar/' + ${p.id}}">Editar</a>
                        <form th:action="@{'/placas/deletar/' + ${p.id}}" method="post" style="display:inline;">
                            <button type="submit" style="background: red;">Deletar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
